openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: EduPlatform — Nền tảng Giáo dục MVP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile and role management
  - name: courses
    description: Course and class management
  - name: questions
    description: Question bank management
  - name: assignments
    description: Assignment creation and management
  - name: submissions
    description: Submission and grading
  - name: dashboard
    description: Dashboard summary data
  - name: reports
    description: Statistics and reporting
  - name: rubrics
    description: Rubric management for manual grading
  - name: system
    description: System settings and administration
  - name: storage
    description: Object storage upload and serving endpoints.
  - name: ai
    description: AI writing grader and question suggestions
  - name: gamification
    description: Badges, leaderboard, learning streaks
  - name: fraud
    description: Fraud detection events
  - name: enterprise
    description: Enterprise HR dashboard and department reports
  - name: lms
    description: LMS integration (Moodle, Google Classroom)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ───────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: courseId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Courses ─────────────────────────────────────────────────────────────────
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a new course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseBody"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /courses/{id}/members:
    get:
      operationId: getCourseMembers
      tags: [courses]
      summary: Get course members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseMember"
    post:
      operationId: addCourseMember
      tags: [courses]
      summary: Add a member to a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCourseMemberBody"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMember"

  # ─── Questions ───────────────────────────────────────────────────────────────
  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions in question bank
      parameters:
        - name: skill
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a new question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get question by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Assignments ─────────────────────────────────────────────────────────────
  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List assignments
      parameters:
        - name: courseId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Create a new assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentBody"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{id}:
    get:
      operationId: getAssignment
      tags: [assignments]
      summary: Get assignment by ID (with questions)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentWithQuestions"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignmentBody"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
    delete:
      operationId: deleteAssignment
      tags: [assignments]
      summary: Delete an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assignments/{id}/questions:
    post:
      operationId: addQuestionToAssignment
      tags: [assignments]
      summary: Add a question to an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddQuestionToAssignmentBody"
      responses:
        "201":
          description: Question added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentQuestion"

  # ─── Submissions ─────────────────────────────────────────────────────────────
  /submissions:
    get:
      operationId: listSubmissions
      tags: [submissions]
      summary: List submissions
      parameters:
        - name: assignmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
    post:
      operationId: createSubmission
      tags: [submissions]
      summary: Submit answers for an assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionBody"
      responses:
        "201":
          description: Submission with grading result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"

  /submissions/{id}:
    get:
      operationId: getSubmission
      tags: [submissions]
      summary: Get submission details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submission details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /submissions/{id}/grade:
    patch:
      operationId: gradeSubmission
      tags: [submissions]
      summary: Manually grade or adjust score of a submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeSubmissionBody"
      responses:
        "200":
          description: Graded submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for current user role
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/upcoming:
    get:
      operationId: getDashboardUpcoming
      tags: [dashboard]
      summary: Get upcoming assignments and due dates
      responses:
        "200":
          description: Upcoming assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingAssignment"

  /dashboard/skill-progress:
    get:
      operationId: getSkillProgress
      tags: [dashboard]
      summary: Get skill progress for the student (4 skills - reading, writing, listening, speaking)
      responses:
        "200":
          description: Skill progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillProgress"

  /dashboard/weekly-stats:
    get:
      operationId: getWeeklyStats
      tags: [dashboard]
      summary: Get weekly submission and score statistics
      responses:
        "200":
          description: Weekly stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyStatItem"

  # ─── Course Schedule ──────────────────────────────────────────────────────────
  /courses/{id}/schedule:
    get:
      operationId: getCourseSchedule
      tags: [courses]
      summary: Get schedule events for a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEvent"
    post:
      operationId: createScheduleEvent
      tags: [courses]
      summary: Create a schedule event for a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleEventBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEvent"
    delete:
      operationId: deleteScheduleEvent
      tags: [courses]
      summary: Delete a schedule event (eventId via query)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── AI Writing Grader ──────────────────────────────────────────────────────
  /ai/grade-essay:
    post:
      operationId: gradeEssay
      tags: [ai]
      summary: AI-grade an essay answer (writing, grammar, vocabulary, structure)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeEssayBody"
      responses:
        "200":
          description: AI grading result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EssayGradingResult"

  /ai/suggest-questions:
    post:
      operationId: suggestQuestions
      tags: [ai]
      summary: AI-suggest questions suitable for student's level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestQuestionsBody"
      responses:
        "200":
          description: Suggested question IDs with explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestQuestionsResult"

  /ai/generate-questions:
    post:
      operationId: generateQuestions
      tags: [ai]
      summary: AI-generate brand-new question drafts (not yet saved to DB)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuestionsBody"
      responses:
        "200":
          description: Generated question drafts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQuestionsResult"

  /ai/personalized-feedback/{submissionId}:
    post:
      operationId: getPersonalizedFeedback
      tags: [ai]
      summary: Get AI personalized feedback for a student's submission
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Personalized feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalizedFeedback"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Fraud Detection ─────────────────────────────────────────────────────────
  /fraud/report:
    post:
      operationId: reportFraudEvent
      tags: [fraud]
      summary: Report a fraud/anomaly event during exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportFraudEventBody"
      responses:
        "201":
          description: Fraud event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudEvent"

  /fraud/events:
    get:
      operationId: listFraudEvents
      tags: [fraud]
      summary: List fraud events (teacher/admin only)
      parameters:
        - name: assignmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of fraud events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEvent"

  /courses/{id}/schedule/{eventId}:
    delete:
      operationId: deleteScheduleEvent
      tags: [courses]
      summary: Delete a schedule event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Course Documents ─────────────────────────────────────────────────────────
  /courses/{id}/documents:
    get:
      operationId: getCourseDocuments
      tags: [courses]
      summary: Get documents for a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseDocument"
    post:
      operationId: createCourseDocument
      tags: [courses]
      summary: Create a course document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDocument"
    delete:
      operationId: deleteCourseDocument
      tags: [courses]
      summary: Delete a course document (docId via query)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: docId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Gamification ────────────────────────────────────────────────────────────
  /gamification/badges:
    get:
      operationId: listBadges
      tags: [gamification]
      summary: List all available badges and which ones the user has earned
      responses:
        "200":
          description: Badges with earned status
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /courses/{id}/documents/{docId}:
    delete:
      operationId: deleteCourseDocument
      tags: [courses]
      summary: Delete a course document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: docId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CSV Import ───────────────────────────────────────────────────────────────
  /courses/{id}/import-members:
    post:
      operationId: importCourseMembers
      tags: [courses]
      summary: Import course members from CSV data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCourseMembersBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  # ─── Reports ─────────────────────────────────────────────────────────────────
  /reports/overview:
    get:
      operationId: getReportsOverview
      tags: [reports]
      summary: Get overview statistics across all courses
      responses:
        "200":
          description: Overview report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsOverview"

  /reports/course/{courseId}:
    get:
      operationId: getCourseReport
      tags: [reports]
      summary: Get detailed statistics for a course (class report)
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseReport"

  /reports/student/{studentId}:
    get:
      operationId: getStudentReport
      tags: [reports]
      summary: Get statistics for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentReport"

  # ─── Annotations (Manual Grading) ─────────────────────────────────────────────
  /submissions/{id}/annotations:
    get:
      operationId: getSubmissionAnnotations
      tags: [submissions]
      summary: Get annotations for a submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
    post:
      operationId: createAnnotation
      tags: [submissions]
      summary: Create an inline annotation on a submission answer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnotationBody"
      responses:
        "201":
          description: Created annotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"

  /submissions/{id}/annotations/{annotationId}:
    delete:
      operationId: deleteAnnotation
      tags: [submissions]
      summary: Delete an annotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
