components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── User ────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        betterAuthUserId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          description: "teacher | center_admin | school_admin | system_admin | enterprise_admin | student"
        avatarUrl:
          type: ["string", "null"]
        organization:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - betterAuthUserId
        - email
        - name
        - role
        - createdAt

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        organization:
          type: string
        avatarUrl:
          type: string

    # ─── Course ──────────────────────────────────────────────────────────────
    Course:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        shortDescription:
          type: ["string", "null"]
        level:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        tags:
          type: ["array", "null"]
          items:
            type: string
        coverImage:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        published:
          type: boolean
        teacherId:
          type: ["integer", "null"]
        teacherName:
          type: ["string", "null"]
        studentCount:
          type: integer
        status:
          type: string
          description: "active | archived"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - published
        - studentCount
        - status
        - createdAt

    CreateCourseBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        level:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        coverImage:
